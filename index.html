<script type="module">

const CUP_POINTS = [15,12,10,9,8,7,6,5,5,4,3,2,1];
const CUP_YEAR = 2026;
const CUP_START_MONTH = 2;
const CUP_END_MONTH = 8;
const ROLES = ["회원","총무","회장","명예회장","명예부회장","명예 총무","전회장"];
const ANNUAL_FEE = 250;
const BIRDIE_FEE = 5;

const fbapp = initializeApp(firebaseConfig);
const db = getFirestore(fbapp);
const storage = getStorage(fbapp);

let MY_NAME = localStorage.getItem("golfMyName") || "";
var FONT_SIZE = localStorage.getItem("golfFontSize") || "1";

let S = {
  tab:"home", somSelected:[], somSize:4, somResult:null, somMode:"random", tournamentTab:"list",
  bannerUrl: null, modal:null, duesTab:"dues", duesYear:new Date().getFullYear(),
  members:[], events:[], scores:[], posts:[], dues:[], birdies:[], rules:[], tournaments:[], cupResults:[], ledger:[], liked:[], somResults:[],
  eNew:{}, sNew:{}, pNew:{category:"일반"}, mNew:{role:"회원"}, dNew:{}, bNew:{}, lNew:{}, rNew:{category:"벌타",title:"",content:""}
};

onSnapshot(collection(db,"members"), s=>{S.members=s.docs.map(d=>({id:d.id,...d.data()}));R();});
var _lastEventCount = -1;
var _lastPostCount = -1;
onSnapshot(query(collection(db,"events"),orderBy("date","desc")), s=>{
  var newEvents=s.docs.map(d=>({id:d.id,...d.data()}));
  if(_lastEventCount>=0 && newEvents.length > _lastEventCount && MY_NAME) {
    var newest=newEvents[0];
    if(newest && newest.organizer !== MY_NAME) sendNotification("🎯 새 이벤트 등록!", newest.title+" - "+newest.date, "new_event");
  }
  _lastEventCount=newEvents.length;
  S.events=newEvents;
  S.events.forEach(function(ev){ if(!ev.waitlist) ev.waitlist=[]; });
  checkDeadlines();R();
});
onSnapshot(query(collection(db,"scores"),orderBy("date","desc")), s=>{S.scores=s.docs.map(d=>({id:d.id,...d.data()}));R();});
onSnapshot(query(collection(db,"posts"),orderBy("date","desc")), s=>{
  var newPosts=s.docs.map(d=>({id:d.id,...d.data()}));
  if(_lastPostCount>=0 && newPosts.length > _lastPostCount && MY_NAME) {
    var newestPost=newPosts[0];
    if(newestPost && newestPost.author !== MY_NAME) sendNotification("📋 새 게시글", "["+newestPost.category+"] "+newestPost.title, "new_post");
  }
  _lastPostCount=newPosts.length;S.posts=newPosts;R();
});
onSnapshot(collection(db,"dues"), s=>{S.dues=s.docs.map(d=>({id:d.id,...d.data()}));R();});
onSnapshot(query(collection(db,"birdies"),orderBy("date","desc")), s=>{S.birdies=s.docs.map(d=>({id:d.id,...d.data()}));R();});
onSnapshot(query(collection(db,"ledger"),orderBy("date","asc")), s=>{S.ledger=s.docs.map(d=>({id:d.id,...d.data()}));R();});
onSnapshot(collection(db,"rules"), s=>{S.rules=s.docs.map(d=>({id:d.id,...d.data()}));R();});
onSnapshot(query(collection(db,"tournaments"),orderBy("date","desc")), s=>{S.tournaments=s.docs.map(d=>({id:d.id,...d.data()}));R();});
onSnapshot(query(collection(db,"cup_results"),orderBy("month","asc")), s=>{S.cupResults=s.docs.map(d=>({id:d.id,...d.data()}));R();});
try{onSnapshot(query(collection(db,"som_results"),orderBy("createdAt","desc")), s=>{S.somResults=s.docs.map(d=>({id:d.id,...d.data()}));R();});}catch(e){console.log("som_results 리스너 오류:",e);}
onSnapshot(collection(db,"settings"), s=>{
  s.docs.forEach(function(d){
    if(d.id==="banner"){var url=d.data().url;S.bannerUrl=(url&&url.length>10)?url:null;}
  });R();
});

const isAdmin = ()=>{var me=S.members.find(m=>m.name===MY_NAME);return me&&(me.role==="회장"||me.role==="총무"||me.role==="명예회장");};
const avgScore = name=>{const ms=S.scores.filter(s=>s.memberName===name);return ms.length?Math.round(ms.reduce((a,b)=>a+b.score,0)/ms.length):"-";};
const isApp = ev=>(ev.applicants||[]).includes(MY_NAME);
const isWait = ev=>(ev.waitlist||[]).includes(MY_NAME);
const waitPos = ev=>(ev.waitlist||[]).indexOf(MY_NAME)+1;
const bscore = ()=>{var cm=new Date().getMonth()+1,cy=new Date().getFullYear();var ms=S.scores.filter(s=>s.date&&s.date.startsWith(cy+"-"+String(cm).padStart(2,"0")));return ms.length?Math.min(...ms.map(s=>s.score)):"-";};
const bplayer = ()=>{var b=bscore();if(b==="-")return "-";var cm=new Date().getMonth()+1,cy=new Date().getFullYear();var ms=S.scores.filter(s=>s.date&&s.date.startsWith(cy+"-"+String(cm).padStart(2,"0")));return (ms.find(s=>s.score===b)||{}).memberName||"-";};
const lastMonthScore = ()=>{var d=new Date();d.setMonth(d.getMonth()-1);var lm=d.getMonth()+1,ly=d.getFullYear();var ms=S.scores.filter(s=>s.date&&s.date.startsWith(ly+"-"+String(lm).padStart(2,"0")));return ms.length?Math.min(...ms.map(s=>s.score)):"-";};
const lastMonthPlayer = ()=>{var b=lastMonthScore();if(b==="-")return "-";var d=new Date();d.setMonth(d.getMonth()-1);var lm=d.getMonth()+1,ly=d.getFullYear();var ms=S.scores.filter(s=>s.date&&s.date.startsWith(ly+"-"+String(lm).padStart(2,"0")));return (ms.find(s=>s.score===b)||{}).memberName||"-";};
const pcColor = p=>p>=100?"#ff7070":p>=75?"#ffaa44":"#7dba7d";

function calcUSGA(name){
  // 날짜 기준 최근 20라운드만 사용
  const all=S.scores.filter(s=>s.memberName===name&&s.courseRating&&s.slopeRating).sort((a,b)=>a.date<b.date?1:-1);
  const ms=all.slice(0,20);
  if(ms.length<3)return null;
  const diffs=ms.map(s=>Math.round((s.score-parseFloat(s.courseRating))*113/parseFloat(s.slopeRating)*10)/10).sort((a,b)=>a-b);
  const n=diffs.length;const use=n>=20?8:n>=16?6:n>=12?5:n>=9?4:n>=7?3:n>=5?2:1;
  return Math.round(diffs.slice(0,use).reduce((a,b)=>a+b,0)/use*0.96*10)/10;
}

async function doApply(ev,action){
  var evId=ev.id;var apps=[...(ev.applicants||[])],wait=[...(ev.waitlist||[])];
  var absent=[...(ev.absentees||[])],maybe=[...(ev.maybes||[])];var maxP=parseInt(ev.maxParticipants||8);
  apps=apps.filter(a=>a!==MY_NAME);wait=wait.filter(a=>a!==MY_NAME);absent=absent.filter(a=>a!==MY_NAME);maybe=maybe.filter(a=>a!==MY_NAME);
  if(action==="join"){if(apps.length<maxP)apps.push(MY_NAME);else wait.push(MY_NAME);}
  else if(action==="absent"){absent.push(MY_NAME);if(wait.length>0&&apps.length<maxP)apps.push(wait.shift());}
  else if(action==="maybe"){maybe.push(MY_NAME);}
  else{if((ev.applicants||[]).includes(MY_NAME)||(ev.waitlist||[]).includes(MY_NAME)){absent.push(MY_NAME);if(wait.length>0&&apps.length<maxP)apps.push(wait.shift());}else{if(apps.length<maxP)apps.push(MY_NAME);else wait.push(MY_NAME);}}
  var idx=S.events.findIndex(e=>e.id===evId);
  if(idx>=0){S.events[idx].applicants=apps;S.events[idx].waitlist=wait;S.events[idx].absentees=absent;S.events[idx].maybes=maybe;}
  S.modal=null;R();
  await updateDoc(doc(db,"events",evId),{applicants:apps,waitlist:wait,absentees:absent,maybes:maybe});
}

async function doUpdateEvent(id){
  const title=document.getElementById("editEvTitle").value,date=document.getElementById("editEvDate").value,teeTime=document.getElementById("editEvTeeTime").value,teeTime2=(document.getElementById("editEvTeeTime2")||{}).value||"",teeTime3=(document.getElementById("editEvTeeTime3")||{}).value||"",maxParticipants=document.getElementById("editEvMax").value,fee=document.getElementById("editEvFee").value,deadline=document.getElementById("editEvDeadline").value,description=document.getElementById("editEvDesc").value;
  const updates={};var courseSelEl=document.getElementById("editEvCourseSelect"),courseManEl=document.getElementById("editEvCourse");var course=courseSelEl&&courseSelEl.value&&courseSelEl.value!=="직접입력"?courseSelEl.value:(courseManEl?courseManEl.value:"");
  var teeTimes=[teeTime,teeTime2,teeTime3].filter(t=>t&&t.trim());
  if(title)updates.title=title;if(course)updates.course=course;if(date)updates.date=date;if(teeTime)updates.teeTime=teeTime;updates.teeTimes=teeTimes;if(maxParticipants)updates.maxParticipants=parseInt(maxParticipants);if(fee!=="")updates.fee=parseInt(fee)||0;if(deadline)updates.deadline=deadline;if(description!==undefined)updates.description=description;
  await updateDoc(doc(db,"events",id),updates);S.modal=null;R();
}
async function doDelEvent(id){if(confirm("이벤트를 삭제할까요?"))await deleteDoc(doc(db,"events",id));S.modal=null;R();}
async function doAddEvent(){
  const e=S.eNew;var course=e.course==="직접입력"?(e.courseManual||""):e.course;
  if(!e.title||!course||!e.date){alert("제목, 골프장, 날짜 필수!");return;}
  var teeTimes=[e.teeTime1,e.teeTime2,e.teeTime3].filter(t=>t&&t.trim());
  await addDoc(collection(db,"events"),{title:e.title,course:course,date:e.date,deadline:e.deadline||"",teeTime:teeTimes[0]||"",teeTimes:teeTimes,maxParticipants:parseInt(e.maxParticipants)||8,fee:parseInt(e.fee)||0,description:e.description||"",organizer:MY_NAME,applicants:[MY_NAME],waitlist:[],status:"모집중"});
  S.eNew={};S.modal=null;R();
}
async function doDelScore(id){if(confirm("스코어를 삭제할까요?"))await deleteDoc(doc(db,"scores",id));}
async function doUpdateScore(id){
  const score=document.getElementById("editScore").value,course=document.getElementById("editCourse").value,date=document.getElementById("editScoreDate").value,courseRating=document.getElementById("editRating").value,slopeRating=document.getElementById("editSlope").value;
  const updates={};if(score)updates.score=parseInt(score);if(course)updates.course=course;if(date)updates.date=date;if(courseRating)updates.courseRating=parseFloat(courseRating);if(slopeRating)updates.slopeRating=parseFloat(slopeRating);
  await updateDoc(doc(db,"scores",id),updates);S.modal=null;R();
}
async function doAddScore(){
  const s=S.sNew;if(!s.memberName||!s.score){alert("회원과 스코어 필수!");return;}
  await addDoc(collection(db,"scores"),{...s,score:parseInt(s.score),courseRating:parseFloat(s.courseRating)||null,slopeRating:parseFloat(s.slopeRating)||113,date:s.date||new Date().toISOString().slice(0,10)});
  setTimeout(()=>doAutoHandi(s.memberName),1000);S.sNew={};S.modal=null;R();
}
async function doAutoHandi(name){
  const h=calcUSGA(name);if(h===null)return;const m=S.members.find(x=>x.name===name);if(!m||m.handicap===h)return;
  const hist=[...(m.handicapHistory||[]),{handicap:m.handicap,date:new Date().toISOString().slice(0,10)}];
  await updateDoc(doc(db,"members",m.id),{handicap:h,handicapHistory:hist});
}
async function doAddPost(){const p=S.pNew;if(!p.title||!p.content){alert("제목과 내용 필수!");return;}await addDoc(collection(db,"posts"),{...p,author:MY_NAME,date:new Date().toISOString().slice(0,10),likes:0});S.pNew={category:"일반"};S.modal=null;R();}
async function doAddMember(){const m=S.mNew;if(!m.name){alert("이름 필수!");return;}await addDoc(collection(db,"members"),{...m,handicap:parseFloat(parseFloat(m.handicap||36).toFixed(1)),joined:new Date().toISOString().slice(0,7)});S.mNew={role:"회원"};S.modal=null;R();}
async function doUpdateMember(id){
  const role=document.getElementById("editRole").value,handicap=document.getElementById("editHandicap").value;const updates={};
  if(role)updates.role=role;if(handicap)updates.handicap=parseFloat(parseFloat(handicap).toFixed(1));
  if(Object.keys(updates).length>0)await updateDoc(doc(db,"members",id),updates);S.modal=null;R();

async function doUpdateHandi(id,val){const m=S.members.find(x=>x.id===id);if(!m)return;const hist=[...(m.handicapHistory||[]),{handicap:m.handicap,date:new Date().toISOString().slice(0,10)}];await updateDoc(doc(db,"members",id),{handicap:parseFloat(parseFloat(val).toFixed(1)),handicapHistory:hist});S.modal=null;R();}

async function doAddDue(){const d=S.dNew;if(!d.memberName||!d.year){alert("회원과 연도 필수!");return;}if(S.dues.find(x=>x.memberName===d.memberName&&x.year==d.year)){alert("이미 납부 기록이 있습니다!");return;}await addDoc(collection(db,"dues"),{memberName:d.memberName,year:parseInt(d.year),amount:ANNUAL_FEE,paidDate:d.paidDate||new Date().toISOString().slice(0,10),note:d.note||""});S.dNew={};S.modal=null;R();}

async function doAddBirdie(){const b=S.bNew;if(!b.memberName||!b.count){alert("회원과 버디 수 필수!");return;}await addDoc(collection(db,"birdies"),{memberName:b.memberName,count:parseInt(b.count),amount:parseInt(b.count)*BIRDIE_FEE,date:b.date||new Date().toISOString().slice(0,10),course:b.course||"",paid:false});S.bNew={};S.modal=null;R();}

async function doAddLedger(){

window.saveTournamentResult=async function(){
  var form=S.newTournament||{};
  if(!form.title||!form.players||!form.players.length){alert("대회명과 참가자를 입력해주세요!");return;}
  var validPlayers=form.players.filter(p=>p.name&&p.gross);
  if(!validPlayers.length){alert("스코어를 입력해주세요!");return;}
  // 핸디오버 기준 정렬: (gross-72) - handicap
  var results=validPlayers.map(p=>({name:p.name,gross:parseInt(p.gross),handicap:parseFloat(p.handicap||0),net:(parseInt(p.gross)-72)-parseFloat(p.handicap||0)})).sort((a,b)=>a.net-b.net);
  var course=form.course==="직접입력"?(form.courseName||""):form.course;
  var date=form.date||new Date().toISOString().slice(0,10);
  // 대회 결과 저장
  await doSaveTournament({title:form.title,date:date,course:course,results:results,createdAt:new Date().toISOString()});
  // 스코어 기록에도 자동 추가 + 핸디 자동 계산
  for(var i=0;i<results.length;i++){
    var r=results[i];
    var courseRating=null,slopeRating=null;
    var foundCourse=COURSES.find(c=>c.name===course);
    if(foundCourse){courseRating=foundCourse.rating;slopeRating=foundCourse.slope;}
    await addDoc(collection(db,"scores"),{memberName:r.name,score:parseInt(r.gross),course:course,date:date,courseRating:courseRating,slopeRating:slopeRating,fromTournament:true});
    (function(name){setTimeout(function(){doAutoHandi(name);},1500);})(r.name);
  }
  // 골통컵 포인트 자동 업데이트
  var dateObj=new Date(date);
  var year=dateObj.getFullYear();
  var month=dateObj.getMonth()+1;
  if(year===CUP_YEAR && month>=CUP_START_MONTH && month<=CUP_END_MONTH){
    var monthKey=year+"-"+String(month).padStart(2,"0");
    var cupPlayers=results.map((r,i)=>({name:r.name,rank:i+1,points:CUP_POINTS[i]||0}));
    var existing=S.cupResults.find(r=>r.month===monthKey);
    if(existing){
      await updateDoc(doc(db,"cup_results",existing.id),{results:cupPlayers,updatedAt:new Date().toISOString()});
    } else {
      await addDoc(collection(db,"cup_results"),{month:monthKey,year:year,results:cupPlayers,createdAt:new Date().toISOString()});
    }
    alert("대회 결과가 저장되고 골통컵 "+month+"월 포인트가 자동 업데이트됐어요! 🏆⭐");
  } else {
    alert("대회 결과가 저장됐어요! 🏆");
  }
  S.tournamentTab="list";S.newTournament=null;R();
};

window.scanScoreCard=async function(input){
  var file=input.files[0];if(!file)return;
  S.modal="scanScore_loading";S.scanError=null;S.scanRawResponse=null;R();
  var clean;
  try{
    // 1. Firebase Storage 업로드
    var timestamp=new Date().toISOString().replace(/[:.]/g,"-");
    var storageRef=ref(storage,"scorecards/"+timestamp+"_"+file.name);
    var uploadResult=await uploadBytes(storageRef,file);
    var imageUrl=await getDownloadURL(uploadResult.ref);
    S.lastScannedImageUrl=imageUrl;
    // 2. 이미지 압축 후 base64 변환 (5MB 제한 대응)
    var base64=await new Promise((resolve,reject)=>{
      var reader=new FileReader();
      reader.onload=e=>{
        var img=new Image();
        img.onload=()=>{
          var canvas=document.createElement("canvas");
          var maxSize=1600;
          var ratio=Math.min(maxSize/img.width,maxSize/img.height,1);
          canvas.width=Math.round(img.width*ratio);
          canvas.height=Math.round(img.height*ratio);
          canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
          // 품질을 낮춰가며 4MB 이하로 압축
          var quality=0.8;
          var dataUrl=canvas.toDataURL("image/jpeg",quality);
          while(dataUrl.length*0.75>4*1024*1024&&quality>0.3){
            quality-=0.1;
            dataUrl=canvas.toDataURL("image/jpeg",quality);
          }
          resolve(dataUrl.split(",")[1]);
        };
        img.onerror=reject;
        img.src=e.target.result;
      };
      reader.onerror=reject;
      reader.readAsDataURL(file);
    });
    var today=new Date().toISOString().slice(0,10);
    var memberNames=S.members.map(m=>m.name).join(", ");
    var courseInfo=COURSES.map(c=>c.name+"(레이팅:"+c.rating+",슬로프:"+c.slope+")").join(", ");
    // 3. Anthropic API 호출
    var response=await fetch("https://us-central1-golf-club-28ff5.cloudfunctions.net/scanScorecard",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:base64}},{type:"text",text:"이 골프 스코어카드를 분석해서 각 플레이어의 18홀 총 타수를 JSON 배열로만 반환해주세요. 분석 규칙: 1) 스코어카드에 각 홀의 오버/언더 숫자(예: 0,1,2,3 또는 동그라미친 숫자)가 적혀있습니다. 2) OUT(전반 9홀 합계)과 IN(후반 9홀 합계)을 찾아서 더하세요. 3) TOTAL 칸이 비어있으면 OUT+IN을 직접 계산하세요. 4) 각 홀 숫자는 파 기준 오버타수입니다. 동그라미는 버디(파-1), 별표(*)는 더블보기 이상입니다. 5) 총 타수 = 파72 + (OUT합계 + IN합계). 예: OUT=5, IN=10이면 총타수=72+15=87. 6) 이름은 한글로 적혀있으며 다음 회원 중에서 가장 유사한 이름으로 매칭하세요: "+memberNames+". 7) 골프장은 다음 중 매칭: "+courseInfo+". 오늘 날짜: "+today+". JSON 배열만 반환. 각 항목: memberName, score(총타수), course, courseRating, slopeRating, date, birdies(동그라미 개수), eagles(이글 개수) 필드."}]}]})
    });
    // 4. HTTP 상태 확인
    if(!response.ok){
      var errBody=await response.text();
      throw new Error("HTTP "+response.status+" - "+errBody.slice(0,300));
    }
    var data=await response.json();
    // 5. API 에러 확인
    if(data.error){throw new Error("API 오류: "+JSON.stringify(data.error));}
    var text=data.content.map(c=>c.text||"").join("");
    clean=text.replace(/```json|```/g,"").trim();
    S.scanRawResponse=clean;
    S.scanResult=JSON.parse(clean);S.modal="scanScore_result";
  }catch(e){
    console.error("스캔 오류:",e);
    S.scanError=e.message||String(e);
    S.scanRawResponse=clean||(S.scanRawResponse||"(응답 없음)");
    S.scanResult=[];S.modal="scanScore_result";
  }
  R();
};
window.viewScorecard=url=>{S.modal="viewCard_"+encodeURIComponent(url);R();};window.updateScanMember=(i,val)=>{if(S.scanResult&&S.scanResult[i])S.scanResult[i].memberName=val;};window.updateScanScore=(i,val)=>{if(S.scanResult&&S.scanResult[i])S.scanResult[i].score=parseInt(val);};
window.saveScanResults=async function(){var results=S.scanResult||[];var saved=0;for(var i=0;i<results.length;i++){var r=results[i];if(!r.memberName||!r.score)continue;await addDoc(collection(db,"scores"),{memberName:r.memberName,score:parseInt(r.score),course:r.course||"",date:r.date||new Date().toISOString().slice(0,10),courseRating:r.courseRating||null,slopeRating:r.slopeRating||null,scorecardUrl:S.lastScannedImageUrl||null});(name=>{setTimeout(()=>doAutoHandi(name),1500);})(r.memberName);saved++;}alert(saved+"명의 스코어가 저장됐어요!");S.scanResult=[];S.lastScannedImageUrl=null;S.modal=null;R();};
window.openSomWithEvent=function(evId){
  var ev=S.events.find(e=>e.id===evId);
  if(!ev)return;
  S.somSelected=[...(ev.applicants||[])];
  S.somResult=null;
  S.currentSomEventId=evId;
  S.modal="drawSom";
  R();
};
window.toggleSomMember=function(name){var idx=S.somSelected.indexOf(name);if(idx>=0)S.somSelected.splice(idx,1);else S.somSelected.push(name);R();};window.setSomSize=n=>{S.somSize=n;R();};
window.doDrawSom=function(){var names=[...S.somSelected];if(names.length<2){alert("2명 이상 선택해주세요!");return;}var size=S.somSize||4,groups=[],numGroups=Math.ceil(names.length/size),mode=S.somMode||"random";if(mode==="ranking"){var ranked=names.map(name=>{var m=S.members.find(x=>x.name===name);return {name,handicap:parseFloat(m&&m.handicap||99)};}).sort((a,b)=>a.handicap-b.handicap);for(var g=0;g<numGroups;g++)groups.push([]);for(var i=0;i<ranked.length;i++){var gIdx=Math.floor(i/size);if(gIdx<groups.length)groups[gIdx].push(ranked[i].name);}groups=groups.filter(g=>g.length>0);}else if(mode==="handicap"){var withH=names.map(name=>{var m=S.members.find(x=>x.name===name);return {name,handicap:parseFloat(m&&m.handicap||99)};}).sort((a,b)=>a.handicap-b.handicap);for(var g=0;g<numGroups;g++)groups.push([]);var dir=1,gi=0;for(var i=0;i<withH.length;i++){groups[gi].push(withH[i].name);gi+=dir;if(gi>=numGroups){gi=numGroups-1;dir=-1;}else if(gi<0){gi=0;dir=1;}}}else{for(var i=names.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[names[i],names[j]]=[names[j],names[i]];}for(var i=0;i<names.length;i+=size)groups.push(names.slice(i,i+size));}S.somResult=groups;R();};
window.saveSomResult=async function(){
  if(!S.somResult||!S.somResult.length){alert("먼저 썸을 뽑아주세요!");return;}
  var evId=S.currentSomEventId||null;
  var ev=evId?S.events.find(e=>e.id===evId):null;
  var docData={
    groups:S.somResult,
    date:new Date().toISOString().slice(0,10),
    eventId:evId||null,
    eventTitle:ev?ev.title:"",
    eventDate:ev?ev.date:"",
    createdBy:MY_NAME,
    createdAt:new Date().toISOString()
  };
  var ref=await addDoc(collection(db,"som_results"),docData);
  alert("✅ 썸 결과가 저장됐어요! 모든 회원이 볼 수 있어요 😊");
  S.modal=null;R();
};
window.doSetSomMode=mode=>{S.somMode=mode;S.somResult=null;R();};

window.uploadBanner=async function(input){var file=input.files[0];if(!file)return;try{var dataUrl=await new Promise((resolve,reject)=>{var img=new Image(),reader=new FileReader();reader.onload=e=>{img.onload=()=>{var canvas=document.createElement("canvas"),maxW=1600,maxH=600,ratio=Math.min(maxW/img.width,maxH/img.height,1);canvas.width=Math.round(img.width*ratio);canvas.height=Math.round(img.height*ratio);canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);resolve(canvas.toDataURL("image/jpeg",0.92));};img.onerror=reject;img.src=e.target.result;};reader.onerror=reject;reader.readAsDataURL(file);});await setDoc(doc(db,"settings","banner"),{url:dataUrl},{merge:true});S.bannerUrl=dataUrl;R();alert("배너 사진이 저장됐어요! 😊");}catch(e){alert("사진 업로드에 실패했어요:\n"+e.message);}};
window.removeBanner=async function(){await setDoc(doc(db,"settings","banner"),{url:""},{merge:true});S.bannerUrl=null;R();};
window.reqNotif=async function(){if(!('Notification' in window)){alert("이 브라우저는 알림을 지원하지 않아요");return;}var perm=await Notification.requestPermission();if(perm==='granted')sendNotification("🔔 골통회 알림 설정 완료!","이제 알림을 받을 수 있어요!","test");else alert("알림을 허용해 주세요!");R();};
window.setFontSize=function(sz){var sizeMap={"small":"90%","medium":"100%","large":"120%"};document.getElementById("app").style.zoom=sizeMap[sz]||"100%";FONT_SIZE=sz;localStorage.setItem("golfFontSize",sz);R();};
window.changeName=function(){if(confirm("이름을 변경할까요?")){localStorage.removeItem("golfMyName");MY_NAME="";R();}};

if(MY_NAME)initNotifications();
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible")setTimeout(R,500);});
R();
</script>
